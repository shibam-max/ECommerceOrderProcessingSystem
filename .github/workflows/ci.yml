name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '8', '11' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Package JAR
        run: mvn package -B -DskipTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: target/surefire-reports/

      - name: Upload JAR artifact
        if: matrix.java-version == '8'
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify (compile + test + package + integration checks)
        run: mvn verify -B

  docker:
    name: Docker Build & Smoke Test
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image (multi-stage — builds JAR inside container)
        run: docker build -t order-processing-system:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag order-processing-system:${{ github.sha }} order-processing-system:latest

      - name: Smoke test — start container and verify health + auth
        run: |
          docker run -d --name test-app -p 8080:8080 order-processing-system:latest
          echo "Waiting for application startup..."
          sleep 25
          echo "=== Health check ==="
          curl -f http://localhost:8080/actuator/health || (docker logs test-app && exit 1)
          echo ""
          echo "=== Swagger UI accessible ==="
          curl -sf -o /dev/null -w "%{http_code}" http://localhost:8080/swagger-ui/index.html | grep -q 200
          echo "Swagger OK"
          echo "=== Login to get JWT token ==="
          TOKEN=$(curl -sf -X POST http://localhost:8080/api/auth/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"admin123"}' | python3 -c "import sys,json; print(json.load(sys.stdin)['token'])")
          echo "Token obtained: ${TOKEN:0:20}..."
          echo "=== Authenticated API test ==="
          curl -f -H "Authorization: Bearer $TOKEN" http://localhost:8080/api/orders || (docker logs test-app && exit 1)
          echo ""
          echo "=== Unauthenticated request returns 401 ==="
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/api/orders)
          [ "$STATUS" = "401" ] && echo "401 confirmed (security working)" || (echo "Expected 401, got $STATUS" && exit 1)
          echo "All smoke tests passed."
          docker stop test-app
