name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest

    strategy:
      matrix:
        java-version: [ '8', '11' ]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ matrix.java-version }}
          distribution: 'temurin'
          cache: 'maven'

      - name: Build with Maven
        run: mvn clean compile -B -q

      - name: Run tests
        run: mvn test -B

      - name: Package JAR
        run: mvn package -B -DskipTests

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-java-${{ matrix.java-version }}
          path: target/surefire-reports/

      - name: Upload JAR artifact
        if: matrix.java-version == '8'
        uses: actions/upload-artifact@v4
        with:
          name: application-jar
          path: target/*.jar

  code-quality:
    name: Code Quality Checks
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Verify (compile + test + package + integration checks)
        run: mvn verify -B

  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: build-and-test
    if: github.ref == 'refs/heads/main'

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'
          cache: 'maven'

      - name: Package JAR
        run: mvn package -B -DskipTests

      - name: Build Docker image
        run: docker build -t order-processing-system:${{ github.sha }} .

      - name: Tag as latest
        run: docker tag order-processing-system:${{ github.sha }} order-processing-system:latest

      - name: Verify Docker image runs
        run: |
          docker run -d --name test-app -p 8080:8080 order-processing-system:latest
          sleep 15
          curl -f http://localhost:8080/actuator/health || (docker logs test-app && exit 1)
          docker stop test-app
